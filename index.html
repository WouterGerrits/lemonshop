<header>

    </div>

<footer>
    © 2026 Lemon Shop. Alle rechten voorbehouden.
</footer>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.querySelector(".menu-toggle");
    const nav = document.querySelector("nav");

    // Open/close menu bij klikken op hamburger
    toggle.addEventListener("click", function(e){
        nav.classList.toggle("active");
        e.stopPropagation(); // voorkomt dat click buiten menu het meteen sluit
    });

    // Sluit menu als je buiten klikt
    document.addEventListener("click", function(e) {
        if(nav.classList.contains("active") && !nav.contains(e.target) && e.target !== toggle) {
            nav.classList.remove("active");
        }
    });
});
</script>

</body>
